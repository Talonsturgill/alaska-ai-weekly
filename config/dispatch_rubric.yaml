# ALASKA.AI Dispatch — WORLD-CLASS video rubric (used by the scorer + critic panel).
# Separate from config/scoring_rubric.yaml (that one grades the weekly text post).
# The routine iterates until this passes. Bar is intentionally high ("banger tier"),
# and it is graded WITHIN the brand style (see style_charter below).
rubric:
  ship_threshold: 8.6          # out of 10 — "excellent within the brand style" (recalibrated 2026-07-21)
  # THRESHOLD RECALIBRATION (2026-07-21, owner decision): the previous 9.0 was implicitly calibrated
  # against a painterly/textured/3D fidelity the brand deliberately does not use, so the ceiling on
  # every run became the house style itself — the panel's weakest axis was "the flat-vector
  # characters" for 9 straight taste-loop rounds while every concrete defect got fixed (see
  # config/eval_ledger.yaml, signature flat-vector-human-rig). Under the within-style descriptors
  # below, 8.6 is where "genuinely excellent: zero concrete defects, characters at finish parity
  # with props, full articulation and idle life" lands empirically. Hard blockers still fail a
  # dispatch at ANY score, and judges must still name every concrete within-style flaw they see.
  max_revision_cycles: unlimited   # NO CAP. The loop self-heals and never stops for quality — it iterates until BOTH gates pass, then delivers. No best-of-N, no early stop.
  # ---------------------------------------------------------------------------
  # STYLE CHARTER (2026-07-21, owner decision — recorded via the repeat-offender tracker):
  # the render style is a PRODUCT/BRAND choice, not a defect to be graded away.
  style_charter:
    brand_style: "flat-vector IGS 2.5D — thick ink outlines, form-shaded fills, minimal friendly faces, hand-staged parallax"
    rule: >-
      Judges grade execution WITHIN this style: form shading (key/fill/rim), AO/contact shadows,
      material cues, articulation, staging, and finish PARITY between characters and props.
      The style itself is never a defect. Notes of the class "make it painterly / textured-realistic
      / 3D / higher-fidelity than the brand" are out of scope and MUST NOT cap any score.
      Concrete within-style flaws (an unshaded flat fill, a frozen held figure, a character whose
      finish lags the props in the same frame, a missing motion cycle) absolutely still count.
  # OBJECTIVE pre-gate — the machine checks-and-balances. quality_gate.py MUST exit 0 BEFORE this
  # rubric is even scored. It catches the regressions a human used to flag (blur, illegible HUD,
  # dead pacing, caption desync) numerically, so they never reach the inbox. Floors are enforced in
  # the script; mirrored here for the reviewer.
  objective_gate:
    script: ".claude/skills/alaska-dispatch/quality_gate.py"
    must_pass_first: true
    checks:
      sharpness:     "median variance-of-Laplacian >= 14     (guards 'looks blurry')"
      hud_text:      "chart-card glyph-edge energy p90 >= 3.2 (guards 'chart letters illegible')"
      caption_text:  "caption glyph-edge energy p90 >= 3.2    (guards 'captions generic / hard to read')"
      event_cadence: "no on-screen-dead window > 5.0s         (guards 'boring / too slow')"
      caption_sync:  "captions built from the TTS word-timings (guards 'voice != captions')"
  hard_blockers:               # ANY of these = automatic fail regardless of score
    - "quality_gate.py fails: blurry, illegible HUD/chart text, a >5s on-screen-dead window, or captions not voice-synced"
    - "a factual error or an unverifiable load-bearing claim"
    - "a typo or wrong number anywhere on screen"
    - "audio gate fails (LUFS/TP/clipping) or music inaudible/uncredited"
    - "captions missing, illegible at phone size, or out of sync"
    - "cultural misstep (savior tone, unverified Native words/iconography)"
    - "palette repeats a recent Dispatch or defaults to blue without reason"
  criteria:
    - name: "Hook & retention"
      weight: 0.12
      10: "First 1-2s stops the scroll; pattern interrupts hold attention; pays off; loop-friendly."
      7:  "Decent open, watch-through likely, minor saggy beat."
      4:  "Slow or generic open; attention drifts."
    - name: "Illustration craft & detail"
      weight: 0.16
      10: "Every surface — characters at finish PARITY with props — carries the house form language: key/fill/rim shading, contact shadows/AO, material cues (fabric, quilting, stitching, wood grain), layered depth planes. Looks designed and intentional; zero unshaded flat fills. Judged WITHIN the flat-vector brand style (style_charter): painterly/3D fidelity is out of scope."
      7:  "Clean and clear but uneven: some surfaces (often characters) read plainer than the best-finished assets in the same frame."
      4:  "Flat clip-art feel; no lighting/texture/depth."
    - name: "Motion & animation craft"
      weight: 0.12
      10: "Everything eased (no linear); anticipation + overshoot/settle; motion blur on fast moves; articulated character motion (real walk/gesture cycles) and visible idle life (weight-shift + breath) on every held figure; layered secondary animation. Judged WITHIN the 2D rig (style_charter): 3D camera realism is out of scope."
      7:  "Mostly eased with real life; one held figure or fast move missing its cycle/blur."
      4:  "Linear/robotic, static sprites, pops."
    - name: "Composition & staging"
      weight: 0.08
      10: "Clear focal hierarchy, hero reads in silhouette, intentional negative space, safe areas honored in 9:16 AND 4:5."
      7:  "Reads, minor crowding or a crop risk."
      4:  "Competing elements; unsafe crops."
    - name: "Color & grade"
      weight: 0.08
      10: "A fresh color world that fits THIS story (not default blue, not a recent palette); cohesive; filmic finishing (grade/bloom/grain/vignette/dither)."
      7:  "Pleasant but generic or slightly off-story."
      4:  "Muddy, banded, or repeats a recent look."
    - name: "Typography & captions"
      weight: 0.06
      10: "Fraunces/JetBrains system used with intent; kinetic type; open captions legible muted at phone size, in sync."
      7:  "Legible, captions present, type a touch static."
      4:  "Hard to read or captions weak."
    - name: "Sound design & mix"
      weight: 0.10
      10: "Layered (ambient + motivated SFX) under an EQ-carved, ducked VO; passes the audio gate; music fits the arc and is credited by composer."
      7:  "VO+music balanced, thin on layers/SFX."
      4:  "Flat or fails a gate metric."
    - name: "VO–illustration sync & entertainment"
      weight: 0.08
      10: "Voice rides the picture beat-for-beat; the piece is genuinely entertaining and feels alive."
      7:  "Synced, watchable, not gripping."
      4:  "Narration-over-slideshow feel."
    - name: "Accuracy & sourcing"
      weight: 0.10
      10: "Every claim ties to a primary source (load-bearing ones to two); on-screen numbers flagged illustrative unless from a real feed; framing is even-handed (the earned honest turn is present, whether a limit, a fair counter-point, or a genuine upside), not one-sided or reflexively sour."
      7:  "All sourced; one secondary-only."
      4:  "A claim is thin or unsourced."
    - name: "Alaska authenticity & cultural respect"
      weight: 0.06
      10: "Reads true to Alaskans; pro-Alaska not savior; cultural subjects handled per the standard."
      7:  "Fine, slightly outsider in one spot."
      4:  "Tone-deaf or imported-feeling."
    - name: "Writing & post quality"
      weight: 0.04
      10: "VO + on-screen + post obey the writing rules; LinkedIn-tuned hook; real closing question."
      7:  "Minor rule slip."
      4:  "Multiple slips or off-voice."
