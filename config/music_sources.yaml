# The music is a CREATIVE CHOICE tied to the angle room's earned angle (Phase 3.5),
# not a default drone. Map the angle's stance/register to a mood, then pick a track
# with that mood (fresh vs the ledger — never reuse a recent track):
angle_to_mood:
  celebratory: [uplifting, hopeful, warm, celebratory]
  cautionary: [tense, urgent, somber, driving]
  curious: [wonder, curious, pondering, delicate]
  comedic: [playful, sneaky, mischievous, wry, caper]
  mixed: [reflective, newsy, driving, warm]
