# ALASKA.AI Dispatch — SHOT STRUCTURE (scene changes + transitions)
# =================================================================
# Why this file exists (the producer note that created it):
#   EVENT_CADENCE and BEAT_DENSITY guarantee something happens every few seconds — but they can ALL happen
#   inside ONE continuous locked scene. The River Sonar Dispatch did exactly that: a 60-second "oner" on a
#   single sonar display. The picture kept evolving (boxes, labels, the run-curve) but the SHOT never
#   changed. Real films cut between distinct shots. A Dispatch must be a SEQUENCE of distinct visual
#   scenes/framings — each commanding the CENTER of frame — connected by MOTIVATED TRANSITIONS, with a new
#   shot roughly every ~8-12 seconds, not one scene running through the whole runtime.
#
#   Two rhythms, both required:
#     - MICRO (within a shot): EVENT_CADENCE + BEAT_DENSITY — a new idea/beat every ~3-5s.
#     - MACRO (between shots):  THIS — a SCENE CHANGE every ~8-12s, with a transition that means something.
#
# How it is enforced (same pattern as the divergence gate — plan it, then verify it):
#   1. Phase 4.5 STORYBOARD declares the SHOT LIST in out/dispatch/storyboard.json > shots[].
#   2. scripts/storyboard_check.py validates the plan (>= min_shots, distinct framings, real transitions).
#   3. The engine emits out/dispatch/shots.json (shot boundaries + the transition at each cut) via
#      dispatch_core.write_shots(...).
#   4. quality_gate.py's SCENE_STRUCTURE check VERIFIES the rendered video actually changes shots — there
#      must be a real visual discontinuity at each declared boundary, not just a relabel. A 'oner' FAILS.

rule:
  min_shots: 4                 # >= 4 distinct shots in ~60s (a scene change at least every ~15s)
  target_shots: [5, 8]         # aim for 5-8 (~8-12s each) — the producer note's "a scene change every ~10s"
  min_shot_seconds: 3.0        # no shot shorter than this (no nervous flash-cutting)
  max_shot_seconds: 16.0       # NO shot may dominate the runtime — a single shot longer than this IS the 'oner' failure
  min_distinct_framings: 3     # >= 3 different framings/vantages across the shots (not the same frame trivially reframed)
  require_transitions: true    # every shot after the first declares a motivated transition_in
  # THE ANTI-ZOOM RULE (added after the v2 critique: the "scene changes" were just the camera zooming/
  # panning over ONE rendered sonar display — reframing, not scene-breaking). Each shot declares its OWN
  # composition across the heavy axes, and a CUT must move to a genuinely different WORLD: adjacent shots
  # must differ on >= min_axis_change_between_shots of these axes. Eight crops of one display all share
  # pov=instrument-screen / layout=hud-instrument-frame / hero=instrument-as-subject -> 0 axes change ->
  # FAIL. A camera move (push-in/pull-out/focus-pull) is legal only when the shot it lands on is itself a
  # different composition by this rule. See docs/craft/CINEMATIC_SCENE_CRAFT.md §0-§1.
  heavy_axes: [pov, layout, motion_vector, hero_treatment]   # each shot names its own (config/composition_axes.yaml vocab)
  min_axis_change_between_shots: 2   # a real scene change flips >= 2 of the heavy axes; < 2 is a zoom, not a cut

# FRAMING vocabulary — the "shot types" (WHAT the camera frames). Vary these across the shots; do not shoot
# the whole piece in one framing. A Dispatch keeps its overall composition IDENTITY (the 7-axis fingerprint
# in composition_axes.yaml) while cutting between these framings of its world.
framings:
  - wide-establish        # the whole scene/system — sets the place
  - push-detail           # pushed in on ONE element (a single fish, a gauge, a hand, a node)
  - macro-closeup         # extreme close on a texture / instrument face / surface
  - alt-vantage           # a different angle or POV on the same world (overhead, behind, from below, the subject's POV)
  - map-territory         # pull out to a map / network / landscape — the big picture
  - data-panel            # a graph / readout / diagram takes the frame (the numbers ARE the subject)
  - subject-portrait      # a hero subject centered (a person, a creature, an object) — held, lit, alive
  - two-up                # a split / comparison (before-after, real-vs-model, here-vs-there)

# TRANSITION vocabulary — HOW one shot becomes the next. A transition must MEAN something, have MOMENTUM,
# and take the viewer SOMEWHERE. Every scene break should ride at least one of four THREADS (the test from
# docs/craft/CINEMATIC_SCENE_CRAFT.md §1): MATCH (anchor the eye across a total world-change), CARRY (an
# element survives the cut and changes role), BUILD (the new screen assembles/boots into being), TRAVEL
# (the camera moves through a shared map/grid/data field). Declare both `transition_in` AND `thread` per shot.
transitions:
  # — MATCH —
  - graphic-match         # B opens on a kindred shape at A's exact screen geometry (2001 bone->craft) — THE core fix
  - match-cut             # a shape in A aligns to a kindred shape in B (beam fan -> tail fan) — a thematic rhyme
  - match-action          # a gesture/motion begun in A completes in a different world in B
  - crossfade             # ~8-18f dissolve WITH a shape hinge — reflection / time passing only; never default glue
  - morph                 # one object's contour becomes another's — transformation is the message
  # — CARRY —
  - carried-element       # a named object (hero_point, coastline) survives the cut and takes a new role
  - double-exposure       # hold a silhouette mask constant, swap what shows THROUGH it
  # — BUILD —
  - assemble              # B builds into being: points -> edges -> faces -> shaded
  - fui-boot              # B is a NEW interface booting up (brackets snap, sweep draws, readouts settle) — not one zoomed
  - mask-wipe             # a shape / passing object / flare sweeps to reveal B — a jump in time or scale
  # — TRAVEL —
  - whip-pan              # fast directional motion-blur smear flings A off / B in — urgency, "meanwhile", a scale jump
  - map-travel            # the camera travels across a shared map/grid to the next scene (one substrate, real motion)
  - hard-cut              # instant switch on a beat — energy, a hard turn; requires the >=2-axis world change to be real
  # — sound (stacks on ANY visual transition; the cheapest pro upgrade) —
  - sound-bridge          # start B's audio (or the VO's next syllable) ~6-14f before the picture cuts (J-cut), or run A's past it (L-cut)
  # — intra-shot MOVES (NOT a scene change by themselves): legal as a transition_in ONLY when the shot they
  #   land on is itself a different composition by the >=2-axis rule. A move develops a world; it cannot CREATE one.
  - push-in               # dolly INTO a region — only if it lands a genuinely different composition (Spielberg oner), else it's a fake zoom
  - pull-out              # dolly OUT to reveal off-frame context — must reveal NEW info, not the same picture smaller
  - focus-pull            # defocus A, focus B in the SAME space — hand attention; pair with a real composition change

center_stage: >
  Each shot must put its ONE focal action at or near the CENTER of the frame at its key moment — the eye
  should land center, not hunt the edges. Lower-third captions and corner HUD are CHROME; the STORY happens
  center-frame. A shot whose only action is a counter ticking in a corner is not a shot, it is a wait.

# PER-SHOT SCHEMA — what each entry in storyboard.json > shots[] must declare (the gate reads these):
#   { id, t: "start-end",
#     framing: <from `framings`>,
#     pov, layout, motion_vector, hero_treatment: <from config/composition_axes.yaml vocab>,  # THIS shot's world
#     transition_in: <from `transitions`>, thread: match|carry|build|travel,                  # how we ARRIVE
#     centered: "the ONE focal action at frame center",
#     means: "what this cut LINKS (the idea the transition carries)" }
# storyboard_check.py fails the board if a shot omits its heavy axes, or if a cut changes < 2 of them
# (that's a zoom, not a scene change).

implementation_note: >
  A shot change is a real RENDER change — a SEPARATE scene-render function for a genuinely different
  composition — NOT a crop/zoom of one canvas (that was the v2 failure; see CINEMATIC_SCENE_CRAFT.md §0).
  Author one render function PER distinct world and switch/blend between them: hard-cut = swap the scene
  function at frame f (zero blend, on the beat); graphic-match/match-cut/morph = align or interpolate a
  shared shape across the cut between two DIFFERENT scenes; crossfade = alpha-blend A and B over N frames
  (reserve for time/reflection); whip-pan = composite A and B horizontally offset under heavy directional
  blur for ~6-10f; mask-wipe/double-exposure = grow/hold a shape's alpha to reveal or window B over A;
  carried-element = keep one named object's pose continuous while everything else swaps; assemble/fui-boot
  = drive B's geometry from a 0->1 build/boot progress; map-travel = animate the camera offset/scale across
  one shared substrate. push-in/pull-out/focus-pull are MOVES inside a shot, never the thing that makes a
  new shot. Keep the brand throughlines (wordmark/eyebrow, type system, caption system, grade) consistent
  ACROSS shots so the cuts read as one film. Emit every boundary + its transition to out/dispatch/shots.json
  via dispatch_core.write_shots(shots, fps, total). The full craft palette is docs/craft/CINEMATIC_SCENE_CRAFT.md.
